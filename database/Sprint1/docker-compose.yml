services:
  mysql:
    image: mysql:8.1.0
    container_name: ces-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mysqlpass
      MYSQL_DATABASE: ces_db
    ports:
      - "33306:3306"
    volumes:
      - ces_mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro

volumes:
  ces_mysql_data:
