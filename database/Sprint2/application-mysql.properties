# MySQL Docker database connection
spring.datasource.url=jdbc:mysql://localhost:33306/ces_db
spring.datasource.username=root
spring.datasource.password=mysqlpass

# Let Docker/MySQL init script create and seed the table.
# If the team keeps schema.sql/data.sql in Spring resources instead, set spring.sql.init.mode=always.
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none
