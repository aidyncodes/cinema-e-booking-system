spring.application.name=backend

spring.datasource.url=jdbc:mysql://localhost:33306/ces_db
spring.datasource.username=root
spring.datasource.password=mysqlpass
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none

# --> Email (registration confirmation) <--
# 1. Login or create an account on mailtrap.io
# 2. Choose "My Sandbox" option during setup.
# 3. In the left nav, go to Email Testing → Sandboxes, then click into it.
# 4. Inside the sandbox, open the Integration tab and select SMTP. 
#       It shows Host, Port, Username, and Password. 
#       This username/password is NOT your Mailtrap login, these are just for testing in this sandbox. 
#       Copy all four.
# 5. Replace (in command below) MAIL_USERNAME=your_mailtrap_username and MAIL_PASSWORD=your_mailtrap_password 
#       w/ the values you just copied from mailtrap.
# 6. Run this in your terminal:
#       export MAIL_HOST=sandbox.smtp.mailtrap.io
#       export MAIL_PORT=2525
#       export MAIL_USERNAME=your_mailtrap_username
#       export MAIL_PASSWORD=your_mailtrap_password
#       ./mvnw spring-boot:run -Dspring-boot.run.profiles=mysql
# 7. In a new terminal, test that this worked. Run this (should output movie info from app):
#       curl http://localhost:8080/api/movies
# 8. Run this in the (cont. in this terminal):
#       curl -X POST http://localhost:8080/api/auth/register \
#       -H "Content-Type: application/json" \
#       -d '{"email":"test@example.com","password":"TestPass123!","firstName":"Test","lastName":"User","phone":"555-555-5555","promotionsOptIn":false}'
#   This command should output: {"message":"Registration successful. Check your email to confirm your account."}
#   You can then check your "inbox" on mail.io and follow the instructions.
#
# Common provider values:
#   Mailtrap (sandbox, recommended for dev -- emails never leave the sandbox):
#     host=sandbox.smtp.mailtrap.io  port=2525
#   Gmail (needs a 16-character App Password, NOT your normal password --
#   generate one at https://myaccount.google.com/apppasswords, requires 2FA on):
#     host=smtp.gmail.com  port=587
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:no-reply@ces-cinema.test}

# Local dev/test AES key for saved payment cards. Override with CARD_ENCRYPTION_KEY
# in production or if you need a different local key.
app.card-encryption-key=${CARD_ENCRYPTION_KEY:MDEyMzQ1Njc4OWFiY2RlZg==}

# Base URL this backend is reachable at, used to build the confirmation link
# emailed to new users. Change if you deploy somewhere other than localhost.
app.backend-base-url=http://localhost:8080
