<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CES Cinema</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/auth.css">
    <script src="/session.js" defer></script>
    <script src="/nav-auth.js" defer></script>
    <script src="/forgot-password.js" defer></script>
</head>
<body>
<header class="topbar">
    <nav class="nav-shell" aria-label="Primary navigation">
        <a class="brand" href="/index.html" aria-label="CES Cinema home">
            <span class="brand-mark">CES</span>
            <span>CES Cinema</span>
        </a>
        <div class="nav-links">
            <a class="nav-link" href="/index.html">Movies</a>
            <a class="nav-link" href="/order-confirmation.html">Orders</a>
            <span id="navAuthSlot" class="nav-auth-slot"></span>
        </div>
    </nav>
</header>

<main class="auth-page">
    <section class="auth-card">
        <h1>Forgot Password</h1>
        <p class="auth-subtitle">Enter the email on your account and we'll send you a link to reset your password.</p>

        <div id="formBanner" class="form-banner hidden" role="alert"></div>

        <form id="forgotForm" novalidate>
            <div class="field">
                <label for="email">Email<span class="required-mark">*</span></label>
                <input class="text-input" type="email" id="email" name="email" autocomplete="email" required>
                <div class="field-error" id="emailError"></div>
            </div>

            <div class="form-actions">
                <button class="button" type="submit" id="submitBtn">Send Reset Link</button>
            </div>
        </form>

        <div class="auth-links" style="margin-top:22px; justify-content:center;">
            <span>Remembered your password? <a href="/login.html">Log in</a></span>
        </div>
    </section>
</main>
</body>
</html>
