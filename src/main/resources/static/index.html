<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CES Cinema</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js" defer></script>
</head>
<body>
<header class="topbar">
    <nav class="nav-shell" aria-label="Primary navigation">
        <a class="brand" href="/index.html" aria-label="CES Cinema home">
            <span class="brand-mark">CES</span>
            <span>CES Cinema</span>
        </a>
        <div class="nav-links">
            <a class="nav-link" href="/index.html">Movies</a>
            <a class="nav-link" href="/order-confirmation.html">Orders</a>
        </div>
    </nav>
</header>

<main class="page">
    <section class="page-header">
        <div>
            <p class="eyebrow">Movie catalogue</p>
            <h1>Now Showing</h1>
            <p class="page-subtitle">Browse the theatre catalogue by genre, search by title, and open a movie page for showtimes and trailer playback.</p>
        </div>
        <div class="tab-group">
            <button class="tab-btn active" id="tabNowPlaying" type="button">Now Playing</button>
            <button class="tab-btn" id="tabComingSoon" type="button">Coming Soon</button>
        </div>
    </section>

    <section class="toolbar" aria-label="Movie search and filters">
        <form id="searchForm" class="search-form" role="search">
            <input id="searchInput" class="search-input" name="title" type="search" autocomplete="off" placeholder="Search by movie title">
            <button class="button" type="submit">Search</button>
        </form>

        <details id="filterMenu" class="filter-menu">
            <summary id="filterSummary" class="button secondary filter-summary">Filters</summary>
            <div class="filter-panel">
                <div class="field">
                    <label for="genreFilter">Genre</label>
                    <select id="genreFilter" class="select">
                        <option value="">All genres</option>
                    </select>
                </div>
                <div class="field">
                    <label for="dateFilter">Show date</label>
                    <select id="dateFilter" class="select">
                        <option value="">Any date</option>
                        <option value="today">Today</option>
                        <option value="tomorrow">Tomorrow</option>
                        <option value="weekend">This weekend</option>
                    </select>
                </div>
                <div class="filter-actions">
                    <button id="clearFilters" class="button secondary" type="button">Reset</button>
                </div>
            </div>
        </details>

        <a class="button secondary" href="/index.html" id="homeLink">Home</a>
    </section>

    <p id="resultSummary" class="result-summary" aria-live="polite"></p>
    <section id="movieSections" class="section-stack" aria-live="polite">
        <div class="loading-state">Loading movies...</div>
    </section>
</main>
</body>
</html>
