<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - CES Cinema</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/auth.css">
    <script src="/session.js" defer></script>
    <script src="/nav-auth.js" defer></script>
    <script src="/register.js" defer></script>
</head>
<body>
<header class="topbar">
    <nav class="nav-shell" aria-label="Primary navigation">
        <a class="brand" href="/index.html" aria-label="CES Cinema home">
            <span class="brand-mark">CES</span>
            <span>CES Cinema</span>
        </a>
        <div class="nav-links">
            <a class="nav-link" href="/index.html">Movies</a>
            <a class="nav-link" href="/order-confirmation.html">Orders</a>
            <span id="navAuthSlot" class="nav-auth-slot"></span>
        </div>
    </nav>
</header>

<main class="auth-page">
    <section class="auth-card">
        <h1>Create Account</h1>
        <p class="auth-subtitle">Sign up to book tickets, save a payment method, and keep a list of favorite movies.</p>

        <div id="formBanner" class="form-banner hidden" role="alert"></div>

        <form id="registerForm" novalidate>
            <div class="field-row">
                <div class="field">
                    <label for="firstName">First name<span class="required-mark">*</span></label>
                    <input class="text-input" type="text" id="firstName" name="firstName" autocomplete="given-name" required>
                    <div class="field-error" id="firstNameError"></div>
                </div>
                <div class="field">
                    <label for="lastName">Last name<span class="required-mark">*</span></label>
                    <input class="text-input" type="text" id="lastName" name="lastName" autocomplete="family-name" required>
                    <div class="field-error" id="lastNameError"></div>
                </div>
            </div>

            <div class="field">
                <label for="email">Email<span class="required-mark">*</span></label>
                <input class="text-input" type="email" id="email" name="email" autocomplete="email" required>
                <div class="field-error" id="emailError"></div>
            </div>

            <div class="field">
                <label for="phone">Phone <span style="text-transform:none;font-weight:600;">(optional)</span></label>
                <input class="text-input" type="tel" id="phone" name="phone" autocomplete="tel" placeholder="706-555-0100">
                <div class="field-error" id="phoneError"></div>
            </div>

            <div class="field">
                <label for="password">Password<span class="required-mark">*</span></label>
                <input class="text-input" type="password" id="password" name="password" autocomplete="new-password" required>
                <div class="field-error" id="passwordError"></div>
            </div>

            <div class="field">
                <label for="confirmPassword">Confirm password<span class="required-mark">*</span></label>
                <input class="text-input" type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
                <div class="field-error" id="confirmPasswordError"></div>
            </div>

            <div class="field">
                <label class="checkbox-field">
                    <input type="checkbox" id="promotionsOptIn" name="promotionsOptIn">
                    <span>Send me promotions and updates about new movies and showtimes.</span>
                </label>
            </div>

            <div class="form-actions">
                <button class="button" type="submit" id="submitBtn">Create Account</button>
            </div>
        </form>

        <div class="auth-links" style="margin-top:22px; justify-content:center;">
            <span>Already have an account? <a href="/login.html">Log in</a></span>
        </div>
    </section>
</main>
</body>
</html>
